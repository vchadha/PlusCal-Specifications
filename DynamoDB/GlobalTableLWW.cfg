\* Model config for GlobalTableLWWSpec
\*
\* Regions are model values (unquoted identifiers).
\* TotalWritesPerRegion uses integers.
\*
\* CHECK_DEADLOCK FALSE is required because processes deliberately block
\* (rather than explicitly terminate) once their writes are done and their
\* replication queue is empty.

SPECIFICATION Spec

CONSTANTS
    Regions = {east, west}
    TotalWritesPerRegion = 2

CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT Completeness
INVARIANT Soundness
